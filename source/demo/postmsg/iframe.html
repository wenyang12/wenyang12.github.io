<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>XDM(跨文档传递消息)</title>
</head>
<body>
    <p>我是iframe</p>
    <p>我接收到到的数据为：<span id="msg" style="color: red;"></span></p>
    <script>
        /*监听看有没有数据发送过来*/
        window.addEventListener('message',function(e) {
            if(e.origin !== "http://www.qdfuns.com"){ // 判断数据发送方是否是可靠的地址
                return
            }
            console.log(e);//打印接收到的数据对象
            document.getElementById('msg').innerHTML = e.data;
            /*回发数据*/
            e.source.postMessage('hello world', e.origin);
        })
    
    
    </script>
</body>
</html>
